<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Danke — Ryqen</title>
<link rel="icon" type="image/png" href="Favicon.jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ffffff;
    --bg-muted: #f3f4f6;
    --text: #111827;
    --text-muted: #6b7280;
    --text-soft: #9ca3af;
    --border: #e5e7eb;
    --accent: #16a34a;
    --accent-hover: #15803d;
    --accent-soft: #dcfce7;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(22, 163, 74, 0.08), transparent 60%),
      #f7fdf7;
    color: var(--text);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  a { color: var(--accent); text-decoration: none; }

  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 0 rgba(17, 24, 39, 0.04), 0 4px 16px rgba(17, 24, 39, 0.04);
  }
  .nav-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .logo {
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .logo-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--accent);
    margin-left: 4px;
    transform: translateY(-2px);
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 140px 24px 96px;
  }
  .card {
    max-width: 560px;
    text-align: center;
  }
  .success-icon {
    width: 72px;
    height: 72px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
    box-shadow: 0 0 0 8px rgba(22, 163, 74, 0.06);
  }
  h1 {
    font-size: clamp(36px, 5vw, 52px);
    font-weight: 800;
    letter-spacing: -0.025em;
    line-height: 1.1;
    margin: 0 0 20px;
    text-wrap: balance;
  }
  .sub {
    font-size: 18px;
    line-height: 1.65;
    color: var(--text-muted);
    margin: 0 0 36px;
    text-wrap: balance;
  }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: white;
    border-radius: 999px;
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 600;
    box-shadow: 0 1px 2px rgba(22, 163, 74, 0.25), 0 4px 12px rgba(22, 163, 74, 0.15);
    transition: background-color 160ms ease, transform 120ms ease;
  }
  .btn-primary:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
  }

  footer {
    background: white;
    border-top: 1px solid var(--border);
    padding: 28px 24px;
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
  }
  footer a {
    color: var(--text-muted);
    transition: color 160ms ease;
  }
  footer a:hover { color: var(--text); }
  footer .sep { margin: 0 10px; color: var(--text-soft); }

  @media (max-width: 540px) {
    .nav-inner { padding: 14px 18px; }
    main { padding: 110px 18px 64px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo" aria-label="Ryqen">
      Ryqen<span class="logo-dot" aria-hidden="true"></span>
    </a>
  </div>
</nav>

<main>
  <div class="card">
    <div class="success-icon" aria-hidden="true">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
        <path d="M5 12.5l4.5 4.5L19 7.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Danke für Ihre Anmeldung!</h1>
    <p class="sub">Sie stehen auf der Liste. Wir melden uns sobald Ryqen startet — Sie werden als Erstes informiert.</p>
    <a href="index.html" class="btn-primary">
      Zurück zur Startseite
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M3 7h8M8 4l3 3-3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>
</main>

<footer>
  © 2026 Ryqen<span class="sep">·</span><a href="impressum.html">Impressum</a><span class="sep">·</span><a href="datenschutz.html">Datenschutz</a>
</footer>

</body>
</html>
